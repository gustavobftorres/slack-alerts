# Alert thresholds for Balancer V3 pool monitoring
alerts:
  tvl_drop_threshold: 0.10       # 10% — alert when TVL drops more than this
  tvl_spike_threshold: 0.50      # 50% — alert when TVL grows more than this
  min_tvl_usd: 10000             # ignore pools with TVL below this value (USD)

# Balancer V3 chains to monitor
chains:
  - MAINNET
  - ARBITRUM
  - BASE
  - OPTIMISM
  - GNOSIS
  - AVALANCHE
  - POLYGON

# Balancer V3 API endpoint
api_url: "https://api-v3.balancer.fi/"

# Path to the daily snapshot file
snapshot_path: "data/snapshot.json"
